# Wag Workflow Blog Or Social Content Publication

## Action

Follow the blog-or-social-content-publication workflow:
1. Create new .mdx file in content/blog/ for the article
2. Add related images to public/social/[platform]/[post-slug]/imgs/
3. Create outline, post, and prompt markdown files in social/[platform]-post/[date-slug]/
4. Optionally add preview.html or batch.json for social publishing
5. Commit all related files together

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: content/blog/*.mdx, public/social/[platform]*/[date-slug]*/imgs/*.png, social/[platform]-post/[date-slug]*/outline.md

